name: Social Activity Sync

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Sync social activity
        run: yarn sync:social
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
          GITHUB_REPO_LIMIT: ${{ vars.GITHUB_REPO_LIMIT }}
          GITHUB_EVENT_LIMIT: ${{ vars.GITHUB_EVENT_LIMIT }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: ${{ vars.X_USERNAME }}
          X_POST_LIMIT: ${{ vars.X_POST_LIMIT }}

      - name: Detect changes
        id: changes
        run: |
          changes=$(git status --porcelain data/socialActivity.ts)
          if [[ -n "$changes" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        id: commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B social-sync
          git add data/socialActivity.ts
          git commit -m "chore: sync social activity"
          git push -u origin social-sync --force-with-lease
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list --head "social-sync" --json number --jq ".[0].number")
          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "social-sync" \
              --title "chore: sync social activity" \
              --body "Automated sync from GitHub and X."
          else
            echo "PR already exists: #$pr_number"
          fi

      - name: Wait for pull request checks
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list --head "social-sync" --json number --jq ".[0].number")
          if [[ -n "$pr_number" ]]; then
            gh pr checks "$pr_number" --watch --fail-fast
          fi

      - name: Enable auto-merge for pull request
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list --head "social-sync" --json number --jq ".[0].number")
          if [[ -n "$pr_number" ]]; then
            gh pr merge "$pr_number" --auto --squash
          fi
